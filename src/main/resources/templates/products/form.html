<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${edit} ? 'Editar producto' : 'Nuevo producto'">Producto</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-shell">
<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" th:href="@{/}">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>RavenShop</span>
        </a>
        <nav class="nav" aria-label="Navegacion principal">
            <a class="is-active" th:href="@{/products}">Productos</a>
            <a th:href="@{/customers}">Clientes</a>
            <a th:href="@{/orders/new}">Crear pedido</a>
        </nav>
    </div>
</header>

<main class="page">
    <header class="page-header">
        <div>
            <p class="page-kicker">Producto</p>
            <h1 th:text="${edit} ? 'Editar producto' : 'Nuevo producto'">Producto</h1>
        </div>
        <div class="actions">
            <a class="button button-secondary" th:href="@{/products}">Volver</a>
        </div>
    </header>

    <form class="form-panel form-grid" th:action="${edit} ? @{/products/{id}(id=${productId})} : @{/products}" th:object="${form}" method="post">
        <div class="field">
            <label for="name">Nombre</label>
            <input id="name" type="text" th:field="*{name}"/>
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error nombre</p>
        </div>

        <div class="field">
            <label for="category">Categoria</label>
            <input id="category" type="text" th:field="*{category}"/>
            <p class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Error categoria</p>
        </div>

        <div class="field">
            <label for="price">Precio</label>
            <input id="price" type="number" step="0.01" min="0.01" th:field="*{price}"/>
            <p class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Error precio</p>
        </div>

        <div class="field">
            <label for="stock">Stock</label>
            <input id="stock" type="number" min="0" th:field="*{stock}"/>
            <p class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">Error stock</p>
        </div>

        <div class="field">
            <label for="tagsText">Tags</label>
            <input id="tagsText" type="text" th:field="*{tagsText}" placeholder="cafe, premium, arabica"/>
        </div>

        <div class="actions">
            <button type="submit">Guardar</button>
            <a class="button button-secondary" th:href="@{/products}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
