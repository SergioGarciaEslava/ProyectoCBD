<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo producto</title>
</head>
<body>
<h1>Nuevo producto</h1>
<form th:action="@{/products}" th:object="${form}" method="post">
    <label>Nombre
        <input type="text" th:field="*{name}"/>
    </label>
    <br/>
    <label>Categoria
        <input type="text" th:field="*{category}"/>
    </label>
    <br/>
    <label>Precio
        <input type="number" step="0.01" min="0" th:field="*{price}"/>
    </label>
    <br/>
    <label>Stock
        <input type="number" min="0" th:field="*{stock}"/>
    </label>
    <br/>
    <label>Tags
        <input type="text" th:field="*{tagsText}" placeholder="cafe, premium, arabica"/>
    </label>
    <br/>
    <button type="submit">Guardar</button>
</form>
<a href="/products">Volver</a>
</body>
</html>
