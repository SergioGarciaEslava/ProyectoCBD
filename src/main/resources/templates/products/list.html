<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
</head>
<body>
<h1>Catalogo de productos</h1>
<a href="/products/new">Nuevo producto</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.id}">products/1-A</td>
        <td th:text="${item.name}">Cafe</td>
        <td th:text="${item.unitPrice}">19.90</td>
        <td>
            <a th:href="@{/products/{id}/edit(id=${#strings.substringAfter(item.id, '/')})}">Editar</a>
            <form th:action="@{/products/{id}/delete(id=${#strings.substringAfter(item.id, '/')})}" method="post" style="display:inline">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
