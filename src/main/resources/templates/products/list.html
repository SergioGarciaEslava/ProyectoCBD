<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
</head>
<body>
<h1>Catalogo de productos</h1>
<p><a th:href="@{/}">Volver al inicio</a></p>

<p th:if="${#lists.isEmpty(products)}">No hay productos disponibles todavia.</p>

<table th:if="${not #lists.isEmpty(products)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Categoria</th>
        <th>Precio</th>
        <th>Stock</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}">products/1-A</td>
        <td th:text="${product.name}">Cafe</td>
        <td th:text="${product.category}">Bebidas</td>
        <td th:text="${product.price}">19.90</td>
        <td th:text="${product.stock}">50</td>
    </tr>
    </tbody>
</table>
</body>
</html>
