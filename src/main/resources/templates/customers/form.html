<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${edit} ? 'Editar cliente' : 'Nuevo cliente'">Cliente</title>
</head>
<body>
<h1 th:text="${edit} ? 'Editar cliente' : 'Nuevo cliente'">Cliente</h1>
<form th:action="${edit} ? @{/customers/{id}(id=${customerId})} : @{/customers}" th:object="${form}" method="post">
    <label>Nombre completo
        <input type="text" th:field="*{fullName}"/>
    </label>
    <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Error nombre</p>
    <br/>
    <label>Email
        <input type="email" th:field="*{email}"/>
    </label>
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error email</p>
    <br/>
    <label>Telefono
        <input type="text" th:field="*{phone}"/>
    </label>
    <br/>
    <label>Calle
        <input type="text" th:field="*{address.street}"/>
    </label>
    <p th:if="${#fields.hasErrors('address.street')}" th:errors="*{address.street}">Error calle</p>
    <br/>
    <label>Ciudad
        <input type="text" th:field="*{address.city}"/>
    </label>
    <p th:if="${#fields.hasErrors('address.city')}" th:errors="*{address.city}">Error ciudad</p>
    <br/>
    <label>Codigo postal
        <input type="text" th:field="*{address.postalCode}"/>
    </label>
    <p th:if="${#fields.hasErrors('address.postalCode')}" th:errors="*{address.postalCode}">Error codigo postal</p>
    <br/>
    <button type="submit">Guardar</button>
</form>
<a th:href="@{/customers}">Volver</a>
</body>
</html>
