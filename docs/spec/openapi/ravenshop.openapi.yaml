openapi: 3.0.3
info:
  title: RavenShop API
  version: 0.1.0
  description: |
    Contrato API-first minimo para RavenShop.
    Este contrato define el diseño esperado de endpoints para healthcheck,
    productos, clientes y pedidos. No implica que todos los endpoints esten
    implementados en esta fase.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Products
  - name: Customers
  - name: Orders
paths:
  /health:
    get:
      tags: [Health]
      summary: Estado general de la aplicacion
      operationId: getApplicationHealth
      responses:
        '200':
          description: Aplicacion operativa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatusResponse'
              examples:
                up:
                  value:
                    application: RavenShop
                    status: UP

  /api/v1/products:
    get:
      tags: [Products]
      summary: Listar productos
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: q
          schema:
            type: string
          description: Texto libre para nombre o descripcion
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
      responses:
        '200':
          description: Pagina de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Products]
      summary: Crear producto
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/products/{productId}:
    get:
      tags: [Products]
      summary: Obtener detalle de producto
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Products]
      summary: Actualizar producto
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Products]
      summary: Eliminar producto
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Producto eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/customers:
    get:
      tags: [Customers]
      summary: Listar clientes
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: q
          schema:
            type: string
          description: Texto libre para nombre, email o ciudad
      responses:
        '200':
          description: Pagina de clientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Customers]
      summary: Crear cliente
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/customers/{customerId}:
    get:
      tags: [Customers]
      summary: Obtener detalle de cliente
      operationId: getCustomerById
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Customers]
      summary: Actualizar cliente
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Customers]
      summary: Eliminar cliente
      operationId: deleteCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '204':
          description: Cliente eliminado
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders:
    get:
      tags: [Orders]
      summary: Listar pedidos
      operationId: listOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: customerId
          schema:
            type: string
        - in: query
          name: minTotal
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Pagina de pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Orders]
      summary: Crear pedido
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Pedido creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Obtener detalle de pedido
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{orderId}/status:
    post:
      tags: [Orders]
      summary: Cambiar estado de pedido
      operationId: changeOrderStatus
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusChangeRequest'
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
    CustomerId:
      in: path
      name: customerId
      required: true
      schema:
        type: string
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Peticion invalida
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Recurso no encontrado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Conflicto de estado o datos
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    HealthStatusResponse:
      type: object
      required: [application, status]
      properties:
        application:
          type: string
          example: RavenShop
        status:
          type: string
          enum: [UP, DOWN]

    Problem:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errorCode:
          type: string
        timestamp:
          type: string
          format: date-time

    Product:
      type: object
      required: [id, name, unitPrice, active]
      properties:
        id:
          type: string
          example: products/1-A
        name:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        unitPrice:
          type: number
          format: double
        active:
          type: boolean

    ProductCreateRequest:
      type: object
      required: [name, unitPrice]
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        unitPrice:
          type: number
          format: double
          minimum: 0
        active:
          type: boolean
          default: true

    Customer:
      type: object
      required: [id, fullName, email]
      properties:
        id:
          type: string
          example: customers/1-A
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        city:
          type: string
        address:
          type: string

    CustomerCreateRequest:
      type: object
      required: [fullName, email]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        city:
          type: string
        address:
          type: string

    OrderStatus:
      type: string
      enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED]

    OrderLineItem:
      type: object
      required: [productId, productName, quantity, unitPrice, lineTotal]
      properties:
        productId:
          type: string
        productName:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: double
        lineTotal:
          type: number
          format: double

    OrderLineItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1

    Order:
      type: object
      required: [id, customerId, status, lineItems, totalAmount]
      properties:
        id:
          type: string
          example: orders/1-A
        customerId:
          type: string
        customerSnapshotName:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineItem'
        totalAmount:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderCreateRequest:
      type: object
      required: [customerId, lineItems]
      properties:
        customerId:
          type: string
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderLineItemRequest'

    OrderStatusChangeRequest:
      type: object
      required: [newStatus]
      properties:
        newStatus:
          $ref: '#/components/schemas/OrderStatus'
        reason:
          type: string

    Pagination:
      type: object
      required: [page, size, totalElements]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64

    ProductPageResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CustomerPageResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        pagination:
          $ref: '#/components/schemas/Pagination'

    OrderPageResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pagination:
          $ref: '#/components/schemas/Pagination'
